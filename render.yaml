databases:
  - name: delivery-db
    databaseName: delivery_db
    user: delivery
    plan: free

services:
  - type: web
    name: delivery-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install --shamefully-hoist && node_modules/.bin/tsc -p packages/shared/tsconfig.json && node_modules/.bin/prisma generate --schema=apps/api/prisma/schema.prisma && node_modules/.bin/tsc -p apps/api/tsconfig.json
    startCommand: node_modules/.bin/prisma migrate deploy --schema=apps/api/prisma/schema.prisma && node apps/api/dist/app.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: delivery-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://delivery-web.onrender.com
      - key: NODE_VERSION
        value: 20

  - type: web
    name: delivery-web
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install --shamefully-hoist && node_modules/.bin/tsc -p packages/shared/tsconfig.json && cd apps/web && ../../node_modules/.bin/next build
    startCommand: cd apps/web && ../../node_modules/.bin/next start -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://delivery-api.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: https://delivery-api.onrender.com
      - key: NODE_VERSION
        value: 20
